*{box-sizing:border-box;margin:0;padding:0}
:root{

  --yellow:#E8C547;--yellow2:#C9A832;--yellow-bg:#E8C54710;
  --red:#E05454;--red2:#C03838;--red-bg:#E0545410;
  --orange:#D97706;--orange-bg:#D9770610;
  --purple:#9B7FFA;--purple2:#7B5FE0;--purple-bg:#9B7FFA10;
  --cyan:#5BB8B8;--cyan2:#3D9A9A;--cyan-bg:#5BB8B810;
  --pink:#E07090;--pink-bg:#E0709010;
}
[data-theme="light"]{
  --bg:#FDF8F3;--bg2:#F5EFE8;--bg3:#EDE5DB;--bg4:#E4D9CC;--bg5:#D9CCBC;
  --border:#D4C5B0;--border2:#C4B09A;--border3:#B09A82;
  --text:#1C1917;--text2:#6B5D50;--text3:#A89880;--text4:#D4C5B0;
  --green:#B45309;--green2:#92400E;--green3:#78350F;--green-bg:#B4530915;--green-glow:rgba(180,83,9,.15);
  --blue:#2563EB;--blue2:#1D4ED8;--blue-bg:#2563EB12;
  --yellow:#D97706;--yellow2:#B45309;--yellow-bg:#D9770612;
  --red:#DC2626;--red2:#B91C1C;--red-bg:#DC262612;
  --orange:#B45309;--orange-bg:#B4530912;
  --purple:#7C3AED;--purple2:#6D28D9;--purple-bg:#7C3AED12;
  --cyan:#0891B2;--cyan2:#0E7490;--cyan-bg:#0891B212;
  --pink:#DB2777;--pink-bg:#DB277712;
  --lime:#8BF04A;--lime-bg:#8BF04A0D;

  --r:12px;--r2:8px;--r3:5px;--r4:16px;
  /* Shadows */
  --shadow-sm:0 1px 3px rgba(0,0,0,.4);
  --shadow:0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:0 8px 40px rgba(0,0,0,.7);
  --shadow-green:0 0 24px rgba(0,229,160,.15);
  --shadow-blue:0 0 24px rgba(59,158,255,.12);
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(217,119,6,.06),transparent),radial-gradient(ellipse 60% 40% at 90% 60%,rgba(124,159,201,.04),transparent)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);padding:8px 11px;font-size:13px;outline:none;font-family:inherit;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
select option{background:var(--bg2)}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
input[type=file]{padding:6px;font-size:12px}
button{cursor:pointer;font-family:inherit;transition:all .15s}
label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.4px;text-transform:uppercase;display:block;margin-bottom:5px}
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;text-align:left;font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2);position:sticky;top:0;z-index:5;cursor:pointer;user-select:none}
th:hover{color:var(--text2)}
th.sorted{color:var(--green)}
td{padding:7px 10px;border-bottom:1px solid #1E2D4422;font-size:12px;vertical-align:middle}
tr:hover td{background:rgba(0,200,150,.03)}
tr.sel td{background:rgba(0,200,150,.07)!important}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.badge{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;display:inline-block;white-space:nowrap}
.btn{border:none;border-radius:var(--r2);padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:var(--green);color:#030A0D;font-weight:700}.btn-p:hover{background:var(--green2)}.btn-p:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed}
.btn-g{background:transparent;border:1px solid var(--border2);color:var(--text2)}.btn-g:hover{border-color:var(--text2);color:var(--text)}
.btn-r{background:var(--red-bg);border:1px solid #FF5E5E44;color:var(--red)}.btn-r:hover{background:#FF5E5E22}
.btn-b{background:var(--blue-bg);border:1px solid #4A9EFF44;color:var(--blue)}.btn-b:hover{background:#4A9EFF22}
.btn-y{background:var(--yellow-bg);border:1px solid #F5C84244;color:var(--yellow)}.btn-y:hover{background:#F5C84222}
.btn-gr{background:var(--green-bg);border:1px solid #00C89644;color:var(--green)}.btn-gr:hover{background:#00C89622}
.btn-big{background:linear-gradient(135deg,var(--green),var(--green2));color:#030A0D;font-weight:800;font-size:14px;border:none;border-radius:var(--r);padding:13px 22px;cursor:pointer;box-shadow:0 0 20px rgba(0,200,150,.2);transition:all .2s;width:100%}
.btn-big:hover:not(:disabled){box-shadow:0 0 30px rgba(0,200,150,.35);transform:translateY(-1px)}
.btn-big:disabled{background:var(--border2);color:var(--text3);box-shadow:none;cursor:not-allowed;transform:none}
.tab-bar{display:flex;gap:2px;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;overflow-x:auto}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:11px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}.tab.on{color:var(--green);border-bottom-color:var(--green)}
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .4s}
.chip{border-radius:4px;padding:3px 9px;font-size:11px;cursor:pointer;white-space:nowrap;border:1px solid var(--border);color:var(--text3);background:transparent;display:inline-block;margin:2px;transition:all .12s}
.chip:hover{border-color:var(--text3)}.chip.on{background:var(--green-bg);border-color:#00C89655;color:var(--green)}.chip.done{background:var(--blue-bg);border-color:#4A9EFF44;color:var(--blue)}
.alert{border-radius:var(--r2);padding:10px 14px;font-size:12px;line-height:1.6;margin-bottom:10px;border-left:3px solid}
.alert-w{background:#1C1400;border-color:var(--yellow);color:#D4A820}
.alert-d{background:#1C0000;border-color:var(--red);color:#CC4444}
.alert-i{background:#001018;border-color:var(--blue);color:var(--blue)}
.alert-s{background:#001810;border-color:var(--green);color:var(--green)}
.toast{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.ti{border-radius:var(--r2);padding:10px 16px;font-size:12px;font-weight:600;max-width:360px;animation:sIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.ti.ok{background:#051C10;border:1px solid #00C89644;color:var(--green)}
.ti.warn{background:#1C1400;border:1px solid #F5C84244;color:var(--yellow)}
.ti.err{background:#1C0505;border:1px solid #FF5E5E44;color:var(--red)}
.ti.info{background:#001018;border:1px solid #4A9EFF44;color:var(--blue)}
@keyframes sIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
pre,code{font-family:'DM Mono',monospace}
code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-size:11px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.modal{background:var(--bg2);border:1px solid var(--border3);border-radius:var(--r4);padding:24px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,.04)}
.stat{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:16px;transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden}

.stat:hover{border-color:var(--border3)}
.stat-v{font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px}
.stat-l{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.score-ring{width:76px;height:76px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:24px;border:3px solid;flex-shrink:0;position:relative}
.real-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.25);border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--green);letter-spacing:.3px}
/* API status */
.api-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.api-dot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
.api-dot.offline{background:var(--red);box-shadow:0 0 8px var(--red)}
.api-dot.checking{background:var(--yellow);animation:pulse 1.2s infinite}
/* Pipeline status badges */
.status-fresh{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(59,158,255,.25)}
.status-emailed{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,229,160,.25)}
.status-replied{background:var(--cyan-bg);color:var(--cyan);border:1px solid rgba(24,216,216,.25)}
.status-interested{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(155,127,250,.25)}
.status-quoted{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(247,203,69,.25)}
.status-won{background:rgba(0,229,160,.1);color:#00FF99;border:1px solid rgba(0,255,153,.25)}
.status-lost{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,77,106,.25)}
.status-unsubscribed{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(255,140,58,.25)}
/* Pipeline board */
.pipeline-col{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:12px;min-height:200px;transition:border-color .2s}
.pipeline-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.pipeline-card:hover{border-color:var(--border3);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
/* Sync bar */
.sync-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:4px 16px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
/* Auth overlay */
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;animation:fadeIn .22s}
.auth-box{background:var(--bg2);border:1px solid var(--border3);border-radius:var(--r4);padding:36px;width:100%;max-width:420px;box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,.04)}
/* Architecture layer cards */
.arch-layer{border-radius:var(--r);padding:20px;border:1px solid;transition:all .25s;cursor:default;position:relative;overflow:hidden}
.arch-layer::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 60%);pointer-events:none}
.arch-layer:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.arch-tag{display:inline-flex;align-items:center;gap:4px;border-radius:5px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:.4px;border:1px solid}
.arch-tech{display:inline-block;background:var(--bg3);border:1px solid var(--border3);border-radius:5px;padding:3px 9px;font-size:10px;font-weight:600;color:var(--text2);margin:2px;font-family:'DM Mono',monospace}
.arch-tech:hover{border-color:var(--text3);color:var(--text)}
.divider-h{height:1px;background:linear-gradient(90deg,transparent,var(--border3) 30%,var(--border3) 70%,transparent);margin:20px 0}
/* Section headings */
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border2)}
@media(max-width:768px){.g2,.g3,.g4{grid-template-columns:1fr}.ga{grid-template-columns:1fr 1fr}.hide-m{display:none!important}}
</style>

// Safe localStorage helpers
function ls(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function fmtDate(iso){if(!iso)return"—";try{return new Date(iso).toLocaleDateString("en-AU");}catch{return"—";}}
function todayKey(){return new Date().toISOString().split("T")[0];}
function todaySent(){return S.dailyLog[todayKey()]||0;}
function dayLimit(){return PROVIDERS[S.settings.provider]||300;}
function addSent(n){const k=todayKey();S.dailyLog[k]=(S.dailyLog[k]||0)+n;lss("v4_dlog",S.dailyLog);}
function getRegion(sub){return Object.entries(REGIONS).find(([,v])=>v.s.includes(sub))?.[0]||"Brisbane";}
function regionColor(sub){return REGIONS[getRegion(sub)]?.c||"#4A9EFF";}
function sanitizeText(s){return String(s||"").replace(/<[^>]*>/g,"").trim();}

function notify(msg,type="ok",dur=4500){
  const id=uid();const el=document.createElement("div");
  el.className=`ti ${type==="warn"?"warn":type==="err"?"err":type==="info"?"info":"ok"}`;
  el.textContent=sanitizeText(msg);el.id="t-"+id;
  document.getElementById("TC").appendChild(el);
  setTimeout(()=>{const e=document.getElementById("t-"+id);if(e){e.style.opacity="0";e.style.transition="opacity .3s";setTimeout(()=>e?.remove(),320);}},dur);
}

// API CLIENT — all requests go through backend
// ════════════════════════════════════════════════════════
let _accessToken = null;

async function apiRequest(method, path, body=null, retried=false){
  const headers = {'Content-Type':'application/json'};
  if(_accessToken) headers['Authorization'] = `Bearer ${_accessToken}`;

  const opts = {method, headers};
  if(body && method!=='GET') opts.body = JSON.stringify(body);

  try{
    const res = await fetch(API_BASE + path, opts);

    // Silent token refresh
    if(res.status===401 && !retried){
      const refreshed = await refreshToken();
      if(refreshed) return apiRequest(method, path, body, true);
      // Refresh failed → show login
      S.authed = false;
      render();
      return null;
    }

    if(!res.ok){
      const err = await res.json().catch(()=>({error:'Request failed'}));
      throw new Error(err.error || err.message || `HTTP ${res.status}`);
    }

    const ct = res.headers.get('content-type')||'';
    if(ct.includes('application/json')) return res.json();
    return res.text();
  }catch(e){
    if(e.name==='TypeError'){
      // Network error — backend offline, fall back to local mode
      S.backendOnline = false;
      render();
    }
    throw e;
  }
}

async function refreshToken(){
  try{
    const res = await fetch(API_BASE+'/auth/refresh',{
      method:'POST',
      credentials:'include' // httpOnly cookie
    });
    if(!res.ok) return false;
    const data = await res.json();
    _accessToken = data.accessToken;
    return true;
  }catch{return false;}
}

const api = {
  get:  (p)        => apiRequest('GET',p),
  post: (p,b)      => apiRequest('POST',p,b),
  patch:(p,b)      => apiRequest('PATCH',p,b),
  put:  (p,b)      => apiRequest('PUT',p,b),
  del:  (p)        => apiRequest('DELETE',p),
};

// ════════════════════════════════════════════════════════
// SPAM CHECKER
// ════════════════════════════════════════════════════════
function spamCheck(subject,body,settings){
  let score=100;const issues=[];const good=[];
  const sl=(subject||"").toLowerCase();const bl=(body||"").toLowerCase();
  const fS=SPAM_WORDS.filter(w=>sl.includes(w));
  const fB=SPAM_WORDS.filter(w=>bl.includes(w));
  if(fS.length){score-=fS.length*12;issues.push(`Subject has spam words: ${fS.slice(0,3).join(", ")}`);}
  if(fB.length){score-=fB.length*4;issues.push(`Body has ${fB.length} spam word(s): ${fB.slice(0,3).join(", ")}`);}
  const caps=(subject||"").replace(/[^A-Za-z]/g,"");
  const capsR=caps.split("").filter(c=>c===c.toUpperCase()&&c!==c.toLowerCase()).length/Math.max(caps.length,1);
  if(capsR>0.4){score-=20;issues.push("Too many CAPITALS in subject");}
  const excl=(subject+body).split("!").length-1;
  if(excl>2){score-=8;issues.push(`Too many exclamation marks (${excl}) — keep under 2`);}
  if(!settings.bName){score-=15;issues.push("Missing business name (legally required)");}
  if(!settings.bAddress){score-=15;issues.push("Missing address (legally required)");}
  if(!settings.bABN){score-=10;issues.push("Missing ABN in footer");}
  if(!settings.bPhone){score-=5;issues.push("Missing phone in footer");}
  if((subject||"").length>60){score-=5;issues.push("Subject too long (60 chars max)");}
  if((subject||"").length<10){score-=10;issues.push("Subject too short");}
  if((body||"").length<80){score-=10;issues.push("Email body too short");}
  if(subject&&subject.includes("{{business_name}}")){score=Math.min(100,score+5);good.push("Personalised subject — +26% open rate");}
  if(body&&body.includes("{{suburb}}")){score=Math.min(100,score+5);good.push("Mentions their suburb — shows you're local");}
  if(settings.bName)good.push("Business name in footer ✓ (AU Spam Act)");
  if(settings.bAddress)good.push("Address in footer ✓ (AU Spam Act)");
  if(settings.bABN)good.push("ABN in footer ✓");
  if(settings.bEmail&&!settings.bEmail.includes("gmail")&&!settings.bEmail.includes("hotmail"))good.push("Company email ✓ (better inbox rate)");
  return{score:Math.max(0,Math.min(100,score)),issues,good};
}

function buildFooter(s){
  const lines=["---","This email was sent to your business as you may benefit from our professional cleaning services. To unsubscribe, reply UNSUBSCRIBE and we will remove you immediately.",""];
  if(s.bName)lines.push(s.bName);
  if(s.bAddress)lines.push(s.bAddress);
  if(s.bPhone)lines.push(s.bPhone);
  if(s.bEmail)lines.push(s.bEmail);
  if(s.bWebsite)lines.push(s.bWebsite);
  if(s.bABN)lines.push("ABN: "+s.bABN);
  return lines.join("\n");
}

// XSS-safe template fill — no raw HTML injection
function fillTpl(str,b){
  return(str||"")
    .replace(/\{\{business_name\}\}/g,sanitizeText(b.name))
    .replace(/\{\{suburb\}\}/g,sanitizeText(b.suburb||""))
    .replace(/\{\{city\}\}/g,"Brisbane")
    .replace(/\{\{state\}\}/g,"QLD")
    .replace(/\{\{category\}\}/g,sanitizeText(b.category||""))
    .replace(/\{\{phone\}\}/g,sanitizeText(b.phone||""));
}

function loadLocal(){
  const l=ls("v4_leads");if(l)S.leads=l;
  const ca=ls("v4_camps");if(ca)S.campaigns=ca;
  const t=ls("v4_tpls");if(t)S.templates=t;
  const cv=ls("v4_cov");if(cv)S.covered=cv;
  const h=ls("v4_hist");if(h)S.history=h;
  const st=ls("v4_settings");if(st)S.settings={...S.settings,...st};
  const dl=ls("v4_dlog");if(dl)S.dailyLog=dl;
  const un=ls("v4_unsub");if(un)S.unsubscribes=un;
  const rp=ls("v4_replies");if(rp)S.replies=rp;
  const as=ls("v4_aiscores");if(as)S.aiScores=as;
  // Migrate v3
  const v3=ls("v3_leads");if(v3&&v3.length&&!S.leads.length){S.leads=v3;saveLocal();}
}

function saveLocal(){
  lss("v4_leads",S.leads);
  lss("v4_settings",S.settings);
  lss("v4_tpls",S.templates);
  lss("v4_camps",S.campaigns);
  lss("v4_cov",S.covered);
  lss("v4_hist",S.history);
  lss("v4_unsub",S.unsubscribes);
  lss("v4_replies",S.replies);
  lss("v4_aiscores",S.aiScores);
}

// BACKEND: GOOGLE PLACES PROXY — key never in browser
// ════════════════════════════════════════════════════════
async function fetchRealBusinesses(suburb, bizType, maxResults=60){
  if(S.backendOnline && S.authed){
    // Backend proxies the Google Places call — API key stays on server
    try{
      const data = await api.get(
        `/search/places?suburb=${encodeURIComponent(suburb)}&bizType=${encodeURIComponent(bizType)}&maxResults=${maxResults}`
      );
      if(data?.results){
        return processPlacesResults(data.results, suburb, bizType, maxResults);
      }
    }catch(e){
      notify('Search via backend failed: '+e.message,'err');
      return [];
    }
  }
  // Offline fallback: notify user
  notify('Backend offline — connect to server to search Google Places','warn');
  return [];
}

function processPlacesResults(results, suburb, bizType, maxResults){
  const existing = new Set(S.leads.map(l=>l.placeId).filter(Boolean));
  const existingEmails = new Set(S.leads.map(l=>l.email).filter(Boolean));
  const existingNames = new Set(S.leads.map(l=>l.name.toLowerCase()));
  const leads=[];
  for(const place of results.slice(0,maxResults)){
    if(existing.has(place.place_id)) continue;
    if(existingNames.has((place.name||"").toLowerCase())) continue;
    const website=place.website||"";
    const email=guessEmail(place.name,website);
    if(email&&existingEmails.has(email)) continue;
    const addr=place.formatted_address||`${suburb} QLD`;
    const pc=(addr.match(/\b4\d{3}\b/)||[])[0]||"";
    leads.push({
      id:uid(),placeId:place.place_id,name:place.name,
      email,emailConfidence:website?"guessed":"none",
      phone:place.formatted_phone_number||place.international_phone_number||"",
      address:addr,suburb,postcode:pc,website,abn:"",
      rating:place.rating||null,reviewCount:place.user_ratings_total||0,
      category:bizType==="All Businesses"?(place.types?.[0]||"Business").replace(/_/g," "):bizType,
      source:"Google Places",status:"fresh",emailed:false,emailedAt:null,
      addedAt:new Date().toISOString(),notes:"",starred:false,followUpDate:null,
    });
  }
  return leads;
}

function guessEmail(bizName,website){
  if(!website&&!bizName) return "";
  if(website){
    const domain=website.replace(/^https?:\/\//,"").replace(/^www\./,"").split("/")[0].split("?")[0];
    if(!domain||domain.length<3) return "";
    return `info@${domain}`;
  }
  return "";
}

async function createLead(leadData){
  if(S.backendOnline&&S.authed){
    try{
      const saved = await api.post('/leads', leadData);
      return saved;
    }catch(e){
      notify('Server save failed, saved locally: '+e.message,'warn');
    }
  }

}

async function updateLead(id, updates){
  if(S.backendOnline&&S.authed){
    try{
      await api.patch('/leads/'+id, updates);
    }catch(e){
      S.syncPending++;
      notify('Queued for sync: '+e.message,'warn');
    }
  }
  // Always update local immediately (optimistic)
  S.leads=S.leads.map(l=>l.id===id?{...l,...updates}:l);
  saveLocal();
}

async function deleteLead(id){
  if(S.backendOnline&&S.authed){
    try{await api.del('/leads/'+id);}
    catch(e){notify('Delete sync failed','warn');}
  }
  S.leads=S.leads.filter(l=>l.id!==id);
  S.selIds.delete(id);
  saveLocal();
}

async function bulkMarkEmailed(ids){
  const limit=dayLimit(),sent=todaySent(),rem=limit-sent;
  if(rem<=0){notify(`Daily limit reached (${limit}/day for ${S.settings.provider}). Resume tomorrow!`,"warn");return;}
  const toMark=ids.slice(0,rem);
  if(toMark.length<ids.length) notify(`Only ${rem} sends remaining — marked first ${toMark.length}`,"warn");

  const now=new Date();
  // Optimistic update
  S.leads=S.leads.map(l=>toMark.includes(l.id)?{...l,emailed:true,emailedAt:now.toISOString(),status:"emailed"}:l);

  if(S.backendOnline&&S.authed){
    try{
      await api.post('/leads/bulk-mark-emailed',{ids:toMark});
    }catch(e){
      notify('Bulk mark sync queued','warn');
      S.syncPending+=toMark.length;
    }
  }

  const nc={...S.covered};
  const suburbs=[...new Set(toMark.map(id=>S.leads.find(l=>l.id===id)?.suburb).filter(Boolean))];
  suburbs.forEach(sub=>{
    const k="B::"+sub;
    nc[k]={...(nc[k]||{}),emailDate:now.toLocaleDateString("en-AU"),emailCount:(nc[k]?.emailCount||0)+toMark.filter(id=>S.leads.find(l=>l.id===id)?.suburb===sub).length};
  });
  S.covered=nc;
  addSent(toMark.length);

  const tName=S.templates.find(t=>t.id===S.activeTpl)?.name||"—";
  const camp={id:uid(),date:now.toLocaleDateString("en-AU"),time:now.toLocaleTimeString("en-AU"),count:toMark.length,template:tName,areas:suburbs.slice(0,10)};
  S.campaigns=[camp,...S.campaigns];

  if(S.backendOnline&&S.authed){
    api.post('/campaigns',camp).catch(()=>{});
  }

  saveLocal();
  S.selIds=new Set();
  notify(`✓ ${toMark.length} marked as emailed · ${Math.max(0,rem-toMark.length)} remaining today`);
  render();
}

// ════════════════════════════════════════════════════════
// LEAD FILTERING
// ════════════════════════════════════════════════════════
function getFiltered(){
  let leads=[...S.leads];
  if(S.fRegion){const rs=REGIONS[S.fRegion]?.s||[];leads=leads.filter(l=>rs.includes(l.suburb));}
  if(S.fCat&&S.fCat!=="All")leads=leads.filter(l=>l.category===S.fCat);
  if(S.fStatus==="fresh")leads=leads.filter(l=>!l.emailed&&l.status!=="unsubscribed");
  else if(S.fStatus==="emailed")leads=leads.filter(l=>l.emailed);
  else if(S.fStatus==="starred")leads=leads.filter(l=>l.starred);
  else if(S.fStatus==="followup")leads=leads.filter(l=>l.followUpDate&&new Date(l.followUpDate)<=new Date());
  else if(S.fStatus==="noemail")leads=leads.filter(l=>!l.email);
  else if(S.fStatus==="replied")leads=leads.filter(l=>l.status==="replied");
  else if(S.fStatus==="interested")leads=leads.filter(l=>l.status==="interested");
  else if(S.fStatus==="won")leads=leads.filter(l=>l.status==="won");
  else if(S.fStatus==="unsubscribed")leads=leads.filter(l=>l.status==="unsubscribed");
  if(S.searchQ){
    const q=S.searchQ.toLowerCase();
    leads=leads.filter(l=>
      (l.name||"").toLowerCase().includes(q)||
      (l.email||"").toLowerCase().includes(q)||
      (l.suburb||"").toLowerCase().includes(q)||
      (l.phone||"").includes(q)||
      (l.notes||"").toLowerCase().includes(q)
    );
  }
  leads.sort((a,b)=>{
    let av=a[S.sortCol]||"",bv=b[S.sortCol]||"";
    if(S.sortCol==="addedAt"||S.sortCol==="emailedAt"){av=av?new Date(av).getTime():0;bv=bv?new Date(bv).getTime():0;}
    if(S.sortCol==="rating"){av=Number(av)||0;bv=Number(bv)||0;}
    if(av<bv)return-S.sortDir;if(av>bv)return S.sortDir;return 0;
  });
  return leads;
}

function exportCSV(leads){

  const tmpl=S.templates.find(t=>t.id===S.activeTpl);

// CSV IMPORT
// ════════════════════════════════════════════════════════
function parseCSVLine(line){
  const result=[];let cur="";let inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(line[i]===","&&!inQ){result.push(cur);cur="";}
    else cur+=line[i];
  }
  result.push(cur);return result.map(v=>v.trim().replace(/^"|"$/g,""));
}

async function importCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2){notify("CSV appears empty","warn");return;}
  const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim().toLowerCase());
  const fi=(names)=>names.reduce((idx,n)=>{if(idx!==-1)return idx;const i=headers.findIndex(h=>h.includes(n));return i;},-1);
  const emailIdx=fi(["email"]);
  const nameIdx=fi(["name","business"]);
  const phoneIdx=fi(["phone"]);
  const suburbIdx=fi(["suburb"]);
  const catIdx=fi(["category","type"]);
  const webIdx=fi(["website","web","url"]);
  const addrIdx=fi(["address","addr"]);
  const existing=new Set(S.leads.map(l=>l.email).filter(Boolean));
  let added=0,skipped=0;
  const newLeads=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const cols=parseCSVLine(lines[i]);
    const email=(emailIdx>=0?cols[emailIdx]||"":"").toLowerCase().trim();
    const name=nameIdx>=0?sanitizeText(cols[nameIdx]||""):"Unknown";
    if(!name){skipped++;continue;}
    if(email&&existing.has(email)){skipped++;continue;}
    if(email) existing.add(email);
    const lead={
      id:uid(),name,email,emailConfidence:email?"imported":"none",
      phone:phoneIdx>=0?sanitizeText(cols[phoneIdx]||""):"",
      suburb:suburbIdx>=0?sanitizeText(cols[suburbIdx]||""):"",
      address:addrIdx>=0?sanitizeText(cols[addrIdx]||""):"",
      category:catIdx>=0?sanitizeText(cols[catIdx]||""):"Imported",
      website:webIdx>=0?sanitizeText(cols[webIdx]||""):"",
      source:"CSV Import",status:"fresh",emailed:false,
      emailedAt:null,addedAt:new Date().toISOString(),notes:"",starred:false,followUpDate:null,
      rating:null,reviewCount:0,placeId:null
    };
    newLeads.push(lead);added++;
  }

  if(S.backendOnline&&S.authed&&newLeads.length){
    try{
      const res=await api.post('/leads/import',{leads:newLeads});
      if(res?.imported) notify(`✓ ${res.imported} leads imported, ${res.skipped||0} duplicates skipped`);
    }catch(e){
      notify('Server import failed, saved locally','warn');
    }
  }

  S.leads=[...S.leads,...newLeads];
  saveLocal();
  if(!S.backendOnline||!S.authed) notify(`✓ ${added} imported${skipped?", "+skipped+" skipped":""}`);
  S.tab="leads";render();
}

async function handleSearch(){
  if(!S.suburb){notify("Select a suburb first","warn");return;}
  S.loading=true;S.loadMsg=`Searching for ${S.bizType} in ${S.suburb}...`;render();
  try{
    const newLeads=await fetchRealBusinesses(S.suburb,S.bizType,S.maxResults);
    if(!newLeads.length){
      S.loading=false;S.loadMsg="";
      notify(`No results found in ${S.suburb} — try a different category or suburb`,"warn");render();return;
    }
    // Server-save batch
    if(S.backendOnline&&S.authed){
      api.post('/leads/batch',{leads:newLeads}).catch(()=>{});
    }
    S.leads=[...S.leads,...newLeads];saveLocal();
    const h={suburb:S.suburb,region:S.region||"All",category:S.bizType,fresh:newLeads.length,date:new Date().toLocaleDateString("en-AU"),source:"Google Places"};
    S.history=[h,...S.history].slice(0,200);lss("v4_hist",S.history);

    nc[ck]={...(nc[ck]||{}),searched:true,searchDate:new Date().toLocaleDateString("en-AU"),searchCount:(nc[ck]?.searchCount||0)+1};
    S.covered=nc;lss("v4_cov",nc);

  }

async function handleBulk(){
  if(!S.bulkSubs.length){notify("Select suburbs first","warn");return;}
  S.bulkRunning=true;S.bulkProg=0;S.bulkTotal=S.bulkSubs.length;render();
  let allNew=[];
  for(let i=0;i<S.bulkSubs.length;i++){
    const sub=S.bulkSubs[i];
    S.loadMsg=`Searching: ${sub}... (${i+1}/${S.bulkSubs.length})`;S.bulkProg=i+1;render();
    try{
      const fresh=await fetchRealBusinesses(sub,S.bizType,30);
      const existingIds=new Set(S.leads.map(l=>l.placeId).filter(Boolean));
      const existingNames=new Set([...S.leads,...allNew].map(l=>l.name.toLowerCase()));
      const unique=fresh.filter(l=>!existingIds.has(l.placeId)&&!existingNames.has(l.name.toLowerCase()));
      allNew=[...allNew,...unique];
      const nc={...S.covered};const ck="B::"+sub;
      nc[ck]={...(nc[ck]||{}),searched:true,searchDate:new Date().toLocaleDateString("en-AU")};
      S.covered=nc;
    }catch(e){console.warn("Error for "+sub,e);}
    await sleep(200);
  }
  lss("v4_cov",S.covered);
  if(S.backendOnline&&S.authed&&allNew.length){
    api.post('/leads/batch',{leads:allNew}).catch(()=>{});
  }
  S.leads=[...S.leads,...allNew];saveLocal();
  const h={suburb:`BULK (${S.bulkSubs.length} suburbs)`,region:S.region||"All",category:S.bizType,fresh:allNew.length,date:new Date().toLocaleDateString("en-AU"),source:"Google Places"};
  S.history=[h,...S.history].slice(0,200);lss("v4_hist",S.history);
  S.bulkRunning=false;S.loadMsg="";S.bulkProg=0;S.bulkSubs=[];S.tab="leads";
  notify(`✓ Bulk done — ${allNew.length} businesses from ${S.bulkTotal} suburbs`);render();
}

// ════════════════════════════════════════════════════════
function addReply(leadId, content, sentiment="neutral"){
  const entry={id:uid(),leadId,content:sanitizeText(content),sentiment,date:new Date().toLocaleDateString("en-AU"),addedAt:new Date().toISOString()};
  if(!S.replies[leadId]) S.replies[leadId]=[];
  S.replies[leadId]=[entry,...S.replies[leadId]];
  // Auto-advance status
  const lead=S.leads.find(l=>l.id===leadId);
  if(lead&&(lead.status==="fresh"||lead.status==="emailed")){
    const newStatus=sentiment==="positive"?"interested":"replied";
    updateLead(leadId,{status:newStatus});
  }
  if(S.backendOnline&&S.authed){
    api.post('/leads/'+leadId+'/replies',entry).catch(()=>{});
  }
  lss("v4_replies",S.replies);
  notify("✓ Reply logged — status updated");
}

function deleteReply(leadId, replyId){
  if(!S.replies[leadId]) return;
  S.replies[leadId]=S.replies[leadId].filter(r=>r.id!==replyId);
  lss("v4_replies",S.replies);
  if(S.backendOnline&&S.authed){
    api.del('/leads/'+leadId+'/replies/'+replyId).catch(()=>{});
  }
}

function getLeadReplies(leadId){
  return S.replies[leadId]||[];
}

function bulkSetFollowUp(ids, date){
  if(!ids.length){notify("No leads selected","warn");return;}
  if(!date){notify("Pick a date first","warn");return;}
  ids.forEach(id=>updateLead(id,{followUpDate:date}));
  if(S.backendOnline&&S.authed){
    api.post('/leads/bulk-follow-up',{ids,followUpDate:date}).catch(()=>{});
  }
  notify("✓ Follow-up set for "+ids.length+" leads → "+date);
  S.selIds=new Set();
  render();
}

function bulkSetStatus(ids, status){
  if(!ids.length){notify("No leads selected","warn");return;}
  ids.forEach(id=>updateLead(id,{
    status,
    emailed:status!=="fresh",
    emailedAt:status==="emailed"?new Date().toISOString():S.leads.find(l=>l.id===id)?.emailedAt
  }));
  if(S.backendOnline&&S.authed){
    api.post('/leads/bulk-status',{ids,status}).catch(()=>{});
  }
  notify("✓ "+ids.length+" leads moved to "+status);
  S.selIds=new Set();
  render();
}

function clearFollowUp(id){
  updateLead(id,{followUpDate:null});
  notify("Follow-up cleared");
  render();
}

  return`
  <div style="background:var(--bg);border-radius:var(--r2);padding:10px;margin-bottom:10px;">

    </div>
    <!-- Log new reply -->
    <div style="background:var(--bg2);border-radius:var(--r2);padding:8px;margin-bottom:8px;">
      <textarea id="reply_text_${leadId}" rows="2" placeholder="Paste or type their reply here..." style="width:100%;background:transparent;border:1px solid var(--border);color:var(--text);font-size:11px;resize:none;border-radius:var(--r2);padding:6px;outline:none;font-family:inherit;margin-bottom:6px;"></textarea>

        <button class="btn btn-gr" style="font-size:10px;padding:4px 10px;margin-left:auto;" onclick="W.logReply('${leadId}')">+ Log Reply</button>
      </div>
    </div>
    <!-- Existing replies -->
    ${replies.length?replies.map(r=>`
      <div style="background:var(--bg2);border:1px solid ${sentimentColor[r.sentiment]||"var(--border)"}33;border-left:3px solid ${sentimentColor[r.sentiment]||"var(--border)"};border-radius:0 var(--r2) var(--r2) 0;padding:8px 10px;margin-bottom:4px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:10px;color:${sentimentColor[r.sentiment]||"var(--text3)"};">${sentimentIcon[r.sentiment]||"😐"} ${(r.sentiment||"neutral").charAt(0).toUpperCase()+(r.sentiment||"neutral").slice(1)}</span>
          <div style="display:flex;gap:8px;align-items:center;">
            <span style="font-size:10px;color:var(--text3);">${r.date||fmtDate(r.addedAt)}</span>
            <button onclick="deleteReply('${leadId}','${r.id}');S.viewingLead=S.leads.find(l=>l.id==='${leadId}');render()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;" title="Delete">✕</button>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text);line-height:1.5;">${esc(r.content)}</div>
      </div>`).join(""):`<div style="text-align:center;padding:12px;font-size:11px;color:var(--text3);">No replies logged yet</div>`}
  </div>`;
}

// RENDER
// ════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  if(!app) return;
  // Show auth if backend is online but not authed
  if(S.backendOnline && !S.authed && S.apiChecked){
    app.innerHTML=buildAuth();
    return;
  }
  app.innerHTML=buildApp();
}

  <div class="card" style="margin-bottom:16px;">
    <div style="font-weight:700;font-size:13px;margin-bottom:10px;">🔄 Pipeline Overview</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      ${PIPELINE_STAGES.map(st=>{const cnt=S.leads.filter(l=>l.status===st.id||(st.id==="emailed"&&l.emailed&&!l.status)).length;return`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:8px 14px;text-align:center;min-width:70px;cursor:pointer;" onclick="S.tab='pipeline';render()"><div style="font-size:18px;font-weight:800;color:${st.color};">${cnt}</div><div style="font-size:9px;color:var(--text3);">${st.label}</div></div>`;}).join("")}

  <div class="card" style="margin-bottom:16px;">
    <div style="font-weight:700;font-size:13px;color:var(--green);margin-bottom:10px;">⚡ Quick Actions</div>

      <button class="btn btn-p" style="font-size:13px;padding:10px 18px;" onclick="W.setTab('find')">🔍 Find Real Leads</button>
      <button class="btn btn-gr" style="font-size:13px;padding:10px 18px;" onclick="W.quickMark()">📧 Mark Emailed (${S.leads.filter(l=>!l.emailed&&l.email&&l.status!=="unsubscribed").length} ready)</button>
      <button class="btn btn-b" style="font-size:13px;padding:10px 18px;" onclick="exportCSV(S.leads.filter(l=>!l.emailed&&l.email))">📥 Export Fresh CSV</button>
      <button class="btn btn-g" onclick="S.modal='addLead';render()">➕ Add Manually</button>
      ${S.syncPending>0?`<button class="btn btn-y" onclick="fullSync()" style="font-size:12px;">↻ Sync ${S.syncPending} pending</button>`:""}
    </div>
  </div>

  <div class="card">
    <div style="font-weight:700;font-size:13px;color:var(--green);margin-bottom:10px;">💡 Daily Workflow</div>
    <div class="ga">
      ${[["1. Find leads","Find Leads → pick suburbs → Google Places returns real businesses","var(--green)"],["2. Export CSV","Export with YAMM columns → import to Google Sheets","var(--blue)"],["3. Send 3 batches","133 morning · 133 afternoon · 134 evening","var(--yellow)"],["4. Mark as emailed","After each batch, mark emailed to track progress","var(--orange)"],["5. Update pipeline","When they reply → move to Replied, Interested, etc.","var(--cyan)"],["6. Rotate suburbs","Never email same suburb within 30 days","var(--purple)"]].map(([t,d,c])=>`<div style="background:var(--bg);border-left:3px solid ${c};border-radius:0 var(--r2) var(--r2) 0;padding:10px;"><div style="font-weight:700;font-size:11px;color:${c};margin-bottom:3px;">${t}</div><div style="font-size:11px;color:var(--text2);line-height:1.5;">${d}</div></div>`).join("")}
    </div>
  </div>
  </div>`;
}

          <select onchange="S.bizType=this.value">

          </select>
        </div>
        <div><label>Max Results</label>
          <select onchange="S.maxResults=Number(this.value)">

      ${S.suburb&&S.covered[ck]?.emailCount?`<div class="alert alert-w" style="margin-bottom:8px;">⚠️ ${S.suburb} emailed ${S.covered[ck].emailDate} (${S.covered[ck].emailCount} sent)</div>`:""}

      <button class="btn-big" ${S.loading||S.bulkRunning||!S.suburb||!S.backendOnline?"disabled":""} onclick="handleSearch()">
        ${S.loading?`<span class="spin"></span>${S.loadMsg}`:`🔍 Search in ${S.suburb||"..."}`}

    <div class="card">

      </div>
      <div style="display:flex;gap:6px;margin-bottom:8px;">

        <select onchange="S.region=this.value;S.suburb='';render()" style="font-size:11px;padding:7px;width:auto;">

      <div style="height:110px;overflow-y:auto;padding:4px;background:var(--bg);border-radius:var(--r2);border:1px solid var(--border);margin-bottom:8px;">

    <div style="font-size:10px;color:var(--text3);margin-top:4px;">3 second delay between emails to avoid spam filters...</div>
  </div>`:""}
${S.bulkRunning?`<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:3px;"><span>${esc(S.loadMsg)}</span><span>${S.bulkProg}/${S.bulkTotal}</span></div><div class="pbar"><div class="pfill" style="width:${S.bulkTotal>0?(S.bulkProg/S.bulkTotal)*100:0}%;background:var(--yellow);"></div></div></div>`:""}
      <button class="btn btn-y" style="width:100%;padding:11px;font-size:13px;font-weight:700;color:#1A0F00;border-radius:var(--r);" ${S.bulkRunning||!S.bulkSubs.length||!S.backendOnline?"disabled":""} onclick="handleBulk()">
        ${S.bulkRunning?`<span class="spin"></span>Fetching...`:`⚡ Bulk Search ${S.bulkSubs.length} Suburbs`}
      </button>
    </div>
  </div>

  ${S.history.length?`<div class="card" style="margin-top:14px;">
    <div style="font-weight:700;font-size:12px;color:var(--text2);margin-bottom:8px;">📋 Recent Searches</div>
    ${S.history.slice(0,8).map(h=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 10px;background:var(--bg);border-radius:var(--r2);font-size:11px;margin-bottom:3px;">
      <span style="color:var(--green);">📍</span>
      <span style="font-weight:600;">${esc(h.suburb)}</span>
      <span class="badge" style="background:var(--blue-bg);color:var(--blue);">${esc(h.category)}</span>
      <span style="color:var(--green);font-weight:700;">+${h.fresh}</span>
      <span style="margin-left:auto;color:var(--text3);">${h.date}</span>
    </div>`).join("")}
  </div>`:""}
  </div>`;
}

// MY LEADS
// ════════════════════════════════════════════════════════
function buildLeads(){
  const filtered=getFiltered();
  const uniqueCats=[...new Set(S.leads.map(l=>l.category).filter(Boolean))].sort();
  const sent=todaySent(),limit=dayLimit();
  const sel=S.selIds.size;
  const colBtn = (id, label) => `<button onclick="W.toggleCol('${id}')" style="font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid ${S.hiddenCols.includes(id)?'var(--border)':'var(--green)'};background:${S.hiddenCols.includes(id)?'transparent':'var(--green-bg)'};color:${S.hiddenCols.includes(id)?'var(--text3)':'var(--green)'};cursor:pointer;">${label}</button>`;
  const followUpDue=S.leads.filter(l=>l.followUpDate&&new Date(l.followUpDate)<=new Date()&&l.status!=="won").length;

  return`<div>
  ${followUpDue>0?`<div class="alert alert-w" style="margin-bottom:10px;">🔔 <strong>${followUpDue} leads</strong> have follow-ups due today! <button class="btn btn-y" style="font-size:10px;padding:3px 8px;margin-left:8px;" onclick="S.fStatus='followup';render()">View →</button></div>`:""}

  <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
    <input placeholder="🔎 Search name, email, suburb, notes..." value="${esc(S.searchQ)}" oninput="S.searchQ=this.value;render()" style="min-width:200px;max-width:280px;font-size:12px;padding:7px 10px;"/>
    <select onchange="S.fRegion=this.value;render()" style="font-size:11px;padding:7px;width:auto;">
      <option value="">All Regions</option>${Object.keys(REGIONS).map(r=>`<option value="${r}" ${S.fRegion===r?"selected":""}>${r}</option>`).join("")}
    </select>
    <select onchange="S.fCat=this.value;render()" style="font-size:11px;padding:7px;width:auto;">
      <option value="">All Types</option>${uniqueCats.map(c=>`<option value="${c}" ${S.fCat===c?"selected":""}>${esc(c)}</option>`).join("")}
    </select>
    <select onchange="S.fStatus=this.value;render()" style="font-size:11px;padding:7px;width:auto;">
      <option value="all">All</option>
      <option value="fresh" ${S.fStatus==="fresh"?"selected":""}>✅ Fresh</option>
      <option value="emailed" ${S.fStatus==="emailed"?"selected":""}>📧 Emailed</option>
      <option value="replied" ${S.fStatus==="replied"?"selected":""}>💬 Replied</option>
      <option value="interested" ${S.fStatus==="interested"?"selected":""}>🔥 Interested</option>
      <option value="won" ${S.fStatus==="won"?"selected":""}>🎉 Won</option>
      <option value="starred" ${S.fStatus==="starred"?"selected":""}>⭐ Starred</option>
      <option value="noemail" ${S.fStatus==="noemail"?"selected":""}>⚠️ No Email</option>
      <option value="followup" ${S.fStatus==="followup"?"selected":""}>🔔 Follow Up Due</option>
      <option value="unsubscribed" ${S.fStatus==="unsubscribed"?"selected":""}>🚫 Unsubscribed</option>
    </select>
    <span style="font-size:11px;color:var(--text3);">${filtered.length}/${S.leads.length}</span>
    <div style="flex:1;"></div>
    <select onchange="S.activeTpl=this.value;render()" style="font-size:11px;padding:6px;border-color:var(--green)44;width:auto;max-width:160px;">
      ${S.templates.map(t=>`<option value="${t.id}" ${S.activeTpl===t.id?"selected":""}>${esc(t.name)}</option>`).join("")}
    </select>
    <button class="btn btn-g" style="font-size:11px;padding:6px 10px;" onclick="W.selectAll()">${sel&&sel===filtered.length?"Deselect":"Select All"}</button>
    <button class="btn btn-gr" style="font-size:11px;padding:6px 10px;" onclick="W.markBtn()">📧 Mark Emailed</button>
    <button class="btn btn-b" style="font-size:11px;padding:6px 10px;" onclick="exportCSV(${sel>0?"getFiltered().filter(l=>S.selIds.has(l.id))":"getFiltered()"})">📥 Export</button>
    ${sel>0?`<button class="btn btn-r" style="font-size:11px;padding:6px 10px;" onclick="W.deleteSelected()">🗑 Delete (${sel})</button>`:""}
  </div>
  ${S.selIds.size>0?`
  <div style="background:var(--yellow-bg);border:1px solid var(--yellow)33;border-radius:var(--r2);padding:10px;margin-bottom:10px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
    <span style="font-size:12px;font-weight:700;color:var(--yellow);align-self:center;">⚡ ${S.selIds.size} selected</span>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <input type="date" id="leads_bulk_date" style="width:160px;font-size:11px;" oninput="S.bulkFollowUpDate=this.value"/>
      <button class="btn btn-y" style="color:#1A0F00;font-size:11px;" onclick="bulkSetFollowUp([...S.selIds],document.getElementById('leads_bulk_date')?.value||'')">📅 Set Follow-Up</button>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <select id="leads_bulk_status" style="font-size:11px;padding:6px;width:auto;">
        ${PIPELINE_STAGES.map(st=>`<option value="${st.id}">${st.label}</option>`).join("")}
      </select>
      <button class="btn btn-gr" style="font-size:11px;" onclick="bulkSetStatus([...S.selIds],document.getElementById('leads_bulk_status')?.value||'emailed')">✓ Move Stage</button>
    </div>
    <button class="btn btn-g" style="font-size:11px;" onclick="S.selIds=new Set();render()">✕ Clear</button>
  </div>`:""}

  ${sent>=limit?`<div class="alert alert-d">🚨 Daily limit reached (${limit}/day). Stop sending — resume tomorrow.</div>`:""}

  ${!filtered.length?`<div style="text-align:center;padding:60px;color:var(--text3);"><div style="font-size:40px;margin-bottom:10px;">📭</div><div style="font-size:14px;font-weight:600;">No leads match your filters</div><button class="btn btn-g" style="margin-top:10px;" onclick="W.setTab('find')">→ Find Leads</button></div>`:`
  <div style="overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);">
    <table>
      <thead><tr>
        <th style="width:32px;"><input type="checkbox" ${S.selIds.size===filtered.length&&filtered.length>0?"checked":""} onchange="W.selectAll()"/></th>
        ${[["name","Business","200px"],["category","Type","120px"],["email","Email","190px"],["phone","Phone","110px"],["suburb","Suburb","100px"],["status","Status","110px"],["rating","Rating","70px"],["addedAt","Added","85px"]].map(([col,lbl,w])=>`<th style="min-width:${w}" onclick="W.sort('${col}')" class="${S.sortCol===col?"sorted":""}">${lbl} <span style="opacity:.5">${S.sortCol===col?(S.sortDir===1?"↑":"↓"):"↕"}</span></th>`).join("")}
        <th style="width:90px;">Actions</th>
      </tr></thead>
      <tbody>
        ${filtered.map((l,i)=>{
          const rc=regionColor(l.suburb);
          const isSel=S.selIds.has(l.id);
          const hasEmail=!!l.email;
          const statusClass=`status-${l.status||"fresh"}`;
          const statusLabel=PIPELINE_STAGES.find(s=>s.id===(l.status||"fresh"))?.label||l.status||"Fresh";
          const hasNote=!!(l.notes&&l.notes.trim());
          const hasFollowUp=!!(l.followUpDate&&new Date(l.followUpDate)<=new Date());
          return`<tr class="${isSel?"sel":""}">
            <td><input type="checkbox" ${isSel?"checked":""} onchange="W.toggle('${l.id}')"/></td>
            <td>
              <div style="display:flex;align-items:center;gap:5px;">
                <span style="cursor:pointer;font-size:13px;" onclick="W.star('${l.id}')" title="${l.starred?"Unstar":"Star"}">${l.starred?"⭐":"☆"}</span>
                <div style="min-width:0;">
                  ${l.website?`<a href="${l.website.startsWith("http")?esc(l.website):"https://"+esc(l.website)}" target="_blank" rel="noopener noreferrer" style="color:var(--text);text-decoration:underline dotted;text-underline-offset:2px;font-weight:600;font-size:12px;" onclick="event.stopPropagation()">${esc(l.name)}</a>`:`<span style="font-weight:600;font-size:12px;">${esc(l.name)}</span>`}
                  ${l.source==="Google Places"?`<span class="real-badge" style="font-size:8px;margin-left:4px;">REAL</span>`:""}
                  ${(S.replies[l.id]||[]).length>0?`<span class="badge" style="background:var(--cyan-bg);color:var(--cyan);border:1px solid var(--cyan)33;font-size:8px;margin-left:4px;">💬 ${(S.replies[l.id]||[]).length}</span>`:""}
                  <div style="font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px;">${esc(l.address||"")}</div>
                  <div style="display:flex;gap:4px;margin-top:2px;">
                    ${hasNote?`<span title="${esc(l.notes)}" style="font-size:9px;color:var(--blue);">📝</span>`:""}
                    ${hasFollowUp?`<span style="font-size:9px;color:var(--yellow);">🔔 Follow up!</span>`:""}
                    ${l.followUpDate&&new Date(l.followUpDate)>new Date()?`<span style="font-size:9px;color:var(--text3);">📅 ${fmtDate(l.followUpDate)}</span>`:""}
                  </div>
                </div>
              </div>
            </td>
            <td><span class="badge" style="background:var(--purple-bg);color:var(--purple);font-size:9px;">${esc(l.category||"")}</span></td>
            <td style="font-size:11px;">
              ${hasEmail
                ?`<div style="display:flex;align-items:center;gap:4px;">
                    <a href="mailto:${esc(l.email)}" onclick="event.stopPropagation()" style="color:var(--blue);text-decoration:none;font-family:'DM Mono',monospace;font-size:10px;">${esc(l.email)}</a>
                    <button onclick="navigator.clipboard.writeText('${esc(l.email)}').then(()=>notify('Copied!','info'))" title="Copy email" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;padding:0;">⧉</button>
                  </div>
                  <div style="font-size:9px;color:${l.emailConfidence==="guessed"?"var(--yellow)":l.emailConfidence==="imported"?"var(--green)":"var(--text3)"};">${l.emailConfidence==="guessed"?"⚠ guessed":l.emailConfidence==="imported"?"✓ imported":""}</div>`
                :`<span style="color:var(--red);font-size:10px;">No email</span>`}
            </td>
            <td style="font-size:11px;color:var(--text2);">${l.phone?`<a href="tel:${l.phone.replace(/\s/g,"")}" style="color:inherit;text-decoration:none;">${esc(l.phone)}</a>`:""}</td>
            <td><span class="badge" style="background:${rc}18;color:${rc};font-size:9px;">${esc(l.suburb||"")}</span></td>
            <td>
              <select onchange="W.updateStatus('${l.id}',this.value)" style="font-size:10px;padding:3px 6px;width:auto;background:transparent;border-color:transparent;" title="Update status">
                ${PIPELINE_STAGES.map(st=>`<option value="${st.id}" ${(l.status||"fresh")===st.id?"selected":""}>${st.label}</option>`).join("")}
              </select>
            </td>
            <td style="font-size:11px;color:var(--yellow);">${l.rating?`★${l.rating}`:""} <span style="color:var(--text3);font-size:10px;">${l.reviewCount?`(${l.reviewCount})`:""}</span></td>
            <td style="font-size:10px;color:var(--text3);">${fmtDate(l.addedAt)}</td>
            <td>
              <div style="display:flex;gap:3px;">
                <button class="btn btn-g" style="font-size:10px;padding:3px 6px;" onclick="W.view('${l.id}')" title="View">👁</button>
                <button class="btn btn-y" style="font-size:10px;padding:3px 6px;" onclick="W.setFollowUp('${l.id}')" title="Follow up">📅</button>
                <button class="btn btn-r" style="font-size:10px;padding:3px 6px;" onclick="W.del('${l.id}')" title="Delete">🗑</button>
              </div>
            </td>
          </tr>`;
        }).join("")}

function buildSheets(){

  try{
    var ss=SpreadsheetApp.getActiveSpreadsheet();
    var sh=ss.getActiveSheet();
    var data=JSON.parse(e.postData.contents);
    var rows=data.rows;if(!rows||!rows.length)return ok("No rows");
    var headers=["Business Name","Category","Email Address","Email Confidence","Phone","Address","Suburb","Region","Postcode","Website","Rating","Reviews","Source","Pipeline Status","Send Status","Email Sent Date","YAMM Subject","YAMM Body","Notes"];
    if(sh.getLastRow()===0){sh.appendRow(headers);}
    rows.forEach(function(r){sh.appendRow(headers.map(function(h){return r[h]||"";}));});
    return ok(rows.length+" rows added");
  }catch(err){return err_(err);}
}

// ════════════════════════════════════════════════════════
// WINDOW HANDLERS
// ════════════════════════════════════════════════════════
const W={
  setTab:t=>{S.tab=t;render();},
  sort:col=>{if(S.sortCol===col)S.sortDir*=-1;else{S.sortCol=col;S.sortDir=1;}render();},
  toggle:id=>{if(S.selIds.has(id))S.selIds.delete(id);else S.selIds.add(id);render();},
  selectAll:()=>{const fl=getFiltered();if(S.selIds.size===fl.length)S.selIds=new Set();else S.selIds=new Set(fl.map(l=>l.id));render();},
  markBtn:()=>{
    const fl=getFiltered();
  const allCols=[["name","Business"],["email","Email"],["suburb","Suburb"],["status","Status"],["rating","Rating"],["phone","Phone"],["followUpDate","Follow-up"],["addedAt","Added"]];
    const ids=S.selIds.size>0?[...S.selIds].filter(id=>fl.some(l=>l.id===id&&!l.emailed&&l.email)):fl.filter(l=>!l.emailed&&l.email&&l.status!=="unsubscribed").map(l=>l.id);
    if(!ids.length){notify("No fresh leads with emails to mark","warn");return;}
    bulkMarkEmailed(ids);
  },
  quickMark:()=>{
    const ids=S.leads.filter(l=>!l.emailed&&l.email&&l.status!=="unsubscribed").map(l=>l.id).slice(0,400);
    if(!ids.length){notify("No fresh leads with emails","warn");return;}
    bulkMarkEmailed(ids);
  },
  deleteSelected:()=>{
    if(!confirm(`Delete ${S.selIds.size} leads?`))return;
    const ids=[...S.selIds];
    ids.forEach(id=>deleteLead(id));
    notify("Deleted "+ids.length+" leads");render();
  },
  del:id=>{if(!confirm("Delete this lead?"))return;deleteLead(id);notify("Deleted");render();},
  star:id=>{updateLead(id,{starred:!S.leads.find(l=>l.id===id)?.starred});render();},
  view:id=>{S.viewingLead=S.leads.find(l=>l.id===id);S.modal="viewLead";render();},
  setFollowUp:id=>{S.viewingLead=S.leads.find(l=>l.id===id);S.modal="setFollowUp";render();},
  saveFollowUp:id=>{
    const val=document.getElementById("fu_date")?.value;
    updateLead(id,{followUpDate:val||null});
    S.modal=null;S.viewingLead=null;
    notify(val?"✓ Follow-up set for "+val:"Follow-up cleared");render();
  },
  updateFollowUp:(id,val)=>{updateLead(id,{followUpDate:val||null});S.viewingLead=S.leads.find(l=>l.id===id);render();},
  updateNote:(id,val)=>{updateLead(id,{notes:sanitizeText(val)});},
  updateStatus:(id,status)=>{
    updateLead(id,{status,emailed:status!=="fresh"?true:false,emailedAt:status==="emailed"?new Date().toISOString():S.leads.find(l=>l.id===id)?.emailedAt});
    render();
  },
  selectAllBulk:()=>{const rs=S.region?REGIONS[S.region]?.s||[]:ALL_SUBURBS;const fl=rs.filter(s=>!S.subSearch||s.toLowerCase().includes(S.subSearch.toLowerCase()));S.bulkSubs=S.bulkSubs.length===fl.length?[]:fl.slice();render();},
  toggleSub:s=>{S.bulkSubs=S.bulkSubs.includes(s)?S.bulkSubs.filter(x=>x!==s):[...S.bulkSubs,s];render();},
  newTpl:()=>{S.editTpl={id:uid(),name:"New Template",subject:"",body:""};render();},
  saveTpl:async()=>{
    if(!S.editTpl)return;
    const ex=S.templates.find(t=>t.id===S.editTpl.id);
    S.templates=ex?S.templates.map(t=>t.id===S.editTpl.id?S.editTpl:t):[...S.templates,S.editTpl];
    lss("v4_tpls",S.templates);
    if(S.backendOnline&&S.authed){
      try{
        if(ex) await api.put('/templates/'+S.editTpl.id,S.editTpl);
        else await api.post('/templates',S.editTpl);
      }catch{}
    }
    S.activeTpl=S.editTpl.id;S.editTpl=null;notify("Template saved");render();
  },
  delTpl:async id=>{
    if(!confirm("Delete template?"))return;
    S.templates=S.templates.filter(t=>t.id!==id);
    lss("v4_tpls",S.templates);
    if(S.backendOnline&&S.authed){api.del('/templates/'+id).catch(()=>{});}
    S.editTpl=null;S.activeTpl=S.templates[0]?.id||"";notify("Deleted");render();
  },
  logManual:()=>{const el=document.getElementById("manN");const n=parseInt(el?.value||"0");if(!n||n<1||n>999){notify("Enter a valid number (1-999)","warn");return;}addSent(n);if(S.backendOnline&&S.authed)api.post('/daily-log/add',{count:n,date:todayKey()}).catch(()=>{});el.value="";notify(`Logged ${n} emails`);render();},
  handleCSVFile:input=>{const f=input.files[0];if(!f)return;if(f.size>5*1024*1024){notify("File too large (max 5MB)","warn");return;}const r=new FileReader();r.onload=e=>importCSV(e.target.result);r.readAsText(f);},
  showPaste:()=>{const a=document.getElementById("pasteArea");if(!a)return;a.innerHTML=`<div style="margin-top:8px;"><label>Paste CSV text</label><textarea id="csvP" rows="4" placeholder="Business Name,Email,Phone,Suburb,Category" style="font-size:11px;font-family:'DM Mono',monospace;"></textarea><div style="display:flex;gap:8px;margin-top:6px;"><button class="btn btn-p" onclick="importCSV(document.getElementById('csvP').value)">Import</button><button class="btn btn-g" onclick="document.getElementById('pasteArea').innerHTML=''">Cancel</button></div></div>`;},
  saveSheetUrl:()=>{const inp=document.getElementById("shUrl");if(inp)S.settings.gSheetUrl=inp.value.trim();if(!S.settings.gSheetUrl?.includes("script.google.com")){notify("Invalid Apps Script URL","warn");return;}W.saveSettings();notify("✅ Sheets URL saved");render();},
  saveSettings:async()=>{
    lss("v4_settings",S.settings);
    if(S.backendOnline&&S.authed){
      try{await api.put('/settings',S.settings);}catch{}
    }
    S.settingsOpen=false;
    notify("✅ Settings saved");render();
  },
  copyScript:()=>{const pre=document.getElementById("scriptPre");if(!pre)return;navigator.clipboard.writeText(pre.innerText||pre.textContent).then(()=>{const btn=document.getElementById("copyBtn");if(btn){btn.textContent="✅ Copied!";setTimeout(()=>{if(btn)btn.textContent="📋 Copy";},2500);}notify("Script copied!");}).catch(()=>notify("Copy manually with Ctrl+C","warn"));},
  addUnsub:()=>{
    const email=document.getElementById("unsub_email")?.value?.trim().toLowerCase();
    const reason=document.getElementById("unsub_reason")?.value||"manual";
    if(!email||!email.includes("@")){notify("Valid email required","warn");return;}
    if(S.unsubscribes.some(u=>u.email===email)){notify("Already on unsubscribe list","warn");return;}
    addUnsubscribe(email,reason);
    const inp=document.getElementById("unsub_email");if(inp)inp.value="";
    render();
  },
  logReply:(leadId)=>{
    const ta=document.getElementById("reply_text_"+leadId);
    const content=(ta?.value||"").trim();
    if(!content){notify("Type the reply content first","warn");return;}
    // Find selected sentiment
    let sentiment="neutral";
    const btns=document.querySelectorAll('[id^="sent_"][id$="_'+leadId+'"]');
    btns.forEach(b=>{if(b.dataset.active==="1")sentiment=b.id.split("_")[1];});
    addReply(leadId,content,sentiment);
    if(ta) ta.value="";
    S.viewingLead=S.leads.find(l=>l.id===leadId);
    render();
  },
  toggleTheme:()=>{
    S.theme = S.theme==='dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', S.theme);
    localStorage.setItem('v4_theme', S.theme);
    render();
  },
  toggleCol:(col)=>{
    if(S.hiddenCols.includes(col)){
      S.hiddenCols=S.hiddenCols.filter(c=>c!==col);
    } else {
      S.hiddenCols=[...S.hiddenCols,col];
    }
    localStorage.setItem('v4_hiddenCols',JSON.stringify(S.hiddenCols));
    render();
  },
  lookupABNManual: async ()=>{
    const abn = document.getElementById('abn_input')?.value?.trim();
    if (!abn) { notify('Enter an ABN first', 'warn'); return; }
    const result = await lookupABN(abn);
    const el = document.getElementById('abn_result');
    if (el && result) {
      el.innerHTML = `<div style="background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);padding:10px;margin-top:8px;">
        <div style="font-weight:700;color:var(--text);margin-bottom:4px;">${esc(result.name)}</div>
        <div style="font-size:11px;color:var(--text2);">ABN: <span style="color:var(--blue);font-family:'DM Mono',monospace;">${result.abn}</span></div>
        <div style="font-size:11px;color:var(--text2);">Type: ${esc(result.type)}</div>
        <div style="font-size:11px;color:var(--text2);">State: ${esc(result.state)} ${esc(result.postcode)}</div>
        <div style="font-size:11px;color:${result.status==='Active'?'var(--green)':'var(--red)'};">Status: ${esc(result.status)}</div>
        <div style="font-size:11px;color:var(--text2);">GST Registered: ${result.gst?'✅ Yes':'❌ No'}</div>
      </div>`;
    }
  },
  lookupByName: async ()=>{
    const name = document.getElementById('bizname_input')?.value?.trim();
    if (!name) { notify('Enter a business name first', 'warn'); return; }
    notify('🔍 Searching ABR...', 'info', 5000);
    const results = await lookupBusinessByName(name, 'QLD');
    const el = document.getElementById('bizname_result');
    if (el) {
      if (!results.length) {
        el.innerHTML = '<div style="font-size:11px;color:var(--text3);margin-top:8px;">No results found</div>';
        return;
      }
      el.innerHTML = results.map(r=>`
        <div style="background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);padding:8px 10px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:12px;font-weight:600;">${esc(r.name)}</div>
            <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;">${r.abn} · ${esc(r.state)} ${esc(r.postcode)}</div>
          </div>
          <span style="font-size:10px;color:${r.status==='Active'?'var(--green)':'var(--red)'};">${esc(r.status)}</span>
        </div>`).join('');
    }
  },
  sendAiChat:()=>{
    const inp=document.getElementById('ai_chat_input');
    const msg=(inp?.value||'').trim();
    if(!msg)return;
    if(inp)inp.value='';
    aiChat(msg);
    setTimeout(()=>{const box=document.getElementById('ai_chat_box');if(box)box.scrollTop=box.scrollHeight;},100);
  },
  bulkAiScore:async()=>{
    const top=S.leads.filter(l=>l.status==='fresh'&&!S.aiScores?.[l.id]).slice(0,10);
    if(!top.length){notify('No fresh unscored leads found','warn');return;}
    S.bulkAiScoring=true;render();
    notify('🤖 Scoring '+top.length+' leads...','info',15000);
    for(const lead of top){await aiScoreLead(lead.id);}
    S.bulkAiScoring=false;
    notify('✅ Bulk scoring complete!','ok');render();
  },
  removeUnsub:id=>{
    if(!confirm("Remove from unsubscribe list? Only do this if they explicitly ask to be re-added."))return;
    S.unsubscribes=S.unsubscribes.filter(u=>u.id!==id);
    lss("v4_unsub",S.unsubscribes);
    notify("Removed from unsubscribe list","warn");render();
  },
  submitAdd:async()=>{
    const name=sanitizeText(document.getElementById("ml_n")?.value||"");
    const email=(document.getElementById("ml_e")?.value||"").toLowerCase().trim();
    const phone=sanitizeText(document.getElementById("ml_p")?.value||"");
    const suburb=document.getElementById("ml_s")?.value||"";
    const cat=document.getElementById("ml_c")?.value||"Offices & Professional";
    const address=sanitizeText(document.getElementById("ml_a")?.value||"");
    const website=document.getElementById("ml_w")?.value?.trim()||"";
    const notes=sanitizeText(document.getElementById("ml_no")?.value||"");
    if(!name){notify("Business name required","warn");return;}
    if(!email){notify("Email required","warn");return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){notify("Invalid email format","warn");return;}
    if(S.leads.some(l=>l.email===email)){notify("Email already exists in your leads","warn");return;}
    if(S.unsubscribes.some(u=>u.email===email)){notify("This email is on the unsubscribe list","warn");return;}
    const lead={id:uid(),name,email,emailConfidence:"manual",phone,mobile:"",address:address||(suburb+" QLD"),suburb,postcode:"",website,abn:"",rating:null,reviewCount:0,category:cat,source:"Manual",status:"fresh",emailed:false,emailedAt:null,addedAt:new Date().toISOString(),notes,starred:false,followUpDate:null};
    const saved=await createLead(lead);
    S.leads.push(saved||lead);
    saveLocal();
    S.modal=null;notify(`✓ ${name} added`);S.tab="leads";render();
  }
};

async function callClaude(prompt, systemPrompt="You are a helpful assistant for a Brisbane cleaning business.") {
  try {
    // Route through backend proxy — API key stays secure on server
    const data = await api.post('/ai/chat', {
      system: systemPrompt,
      messages: [{ role: "user", content: prompt }]
    });
    return data.content?.[0]?.text || "No response";
  } catch(e) {
    return "AI error: " + e.message;
  }
}

// ── AI Email Writer ──────────────────────────────────────
async function aiWriteEmail(leadId) {
  const lead = S.leads.find(l => l.id === leadId);
  if (!lead) return;
  const tmpl = S.templates.find(t => t.id === S.activeTpl);
  notify("✍️ AI writing personalised email...", "info", 8000);
  S.aiLoading = leadId + "_email";
  render();

  const prompt = `Write a professional cold outreach email for a Brisbane cleaning business to this lead:
- Business name: ${lead.name}
- Category: ${lead.category || "business"}
- Suburb: ${lead.suburb || "Brisbane"}
- Website: ${lead.website || "none"}
- Rating: ${lead.rating ? lead.rating + " stars" : "unknown"}
- Notes: ${lead.notes || "none"}
${tmpl ? `Base it loosely on this template subject: "${tmpl.subject}"` : ""}

Write a short, friendly, personalised email (under 150 words). Include subject line.
Format: 
SUBJECT: [subject here]

[email body here]`;

  const result = await callClaude(prompt, "You are an expert cold email writer for a Brisbane commercial cleaning business. Write concise, friendly, personalised emails that get responses.");
  S.aiLoading = null;

  // Parse subject and body
  const lines = result.split('\n');
  const subjectLine = lines.find(l => l.startsWith('SUBJECT:'));
  const subject = subjectLine ? subjectLine.replace('SUBJECT:', '').trim() : "Cleaning services for " + lead.name;
  const body = lines.filter(l => !l.startsWith('SUBJECT:')).join('\n').trim();

  S.aiEmailResult = { leadId, subject, body };
  render();
  notify("✅ AI email ready!", "ok");
}

// GMAIL SENDING — Free, 500 emails/day via Gmail OAuth
// ════════════════════════════════════════════════════════
const GMAIL_SCOPES = 'https://www.googleapis.com/auth/gmail.send';
let gmailAccessToken = null;

async function connectGmail() {
  const clientId = S.settings.gmailClientId;
  if (!clientId) {
    notify('Enter your Google OAuth Client ID in Settings first', 'warn');
    S.settingsOpen = true;
    render();
    return;
  }
  // Open Google OAuth popup
  const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
  const scope = encodeURIComponent(GMAIL_SCOPES);
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=token&scope=${scope}&prompt=consent`;
  
  const popup = window.open(authUrl, 'gmail_auth', 'width=500,height=600,scrollbars=yes');
  
  // Listen for redirect with token
  const checkInterval = setInterval(() => {
    try {
      if (popup.closed) {
        clearInterval(checkInterval);
        return;
      }
      const url = popup.location.href;
      if (url.includes('access_token=')) {
        const token = url.match(/access_token=([^&]+)/)?.[1];
        if (token) {
          gmailAccessToken = token;
          S.gmailConnected = true;
          lss('v4_gmail_token', token);
          popup.close();
          clearInterval(checkInterval);
          notify('✅ Gmail connected! Ready to send emails.', 'ok');
          render();
        }
      }
    } catch(e) {
      // Cross-origin — still loading
    }
  }, 500);
}

function disconnectGmail() {
  gmailAccessToken = null;
  S.gmailConnected = false;
  localStorage.removeItem('v4_gmail_token');
  notify('Gmail disconnected', 'info');
  render();
}

async function sendViaGmail(to, subject, body) {
  if (!gmailAccessToken) {
    notify('Connect Gmail first in Settings', 'warn');
    return false;
  }
  
  // Build RFC 2822 email
  const email = [
    `To: ${to}`,
    `From: ${S.settings.bEmail || 'me'}`,
    `Subject: ${subject}`,
    `Content-Type: text/plain; charset=utf-8`,
    ``,
    body
  ].join('\r\n');
  
  const encoded = btoa(unescape(encodeURIComponent(email)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  
  try {
    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${gmailAccessToken}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ raw: encoded })
    });
    
    if (res.status === 401) {
      // Token expired
      gmailAccessToken = null;
      S.gmailConnected = false;
      localStorage.removeItem('v4_gmail_token');
      notify('Gmail session expired — reconnect in Settings', 'warn');
      return false;
    }
    
    if (!res.ok) {
      const err = await res.json();
      notify('Gmail error: ' + (err.error?.message || 'Unknown error'), 'err');
      return false;
    }
    
    return true;
  } catch(e) {
    notify('Send failed: ' + e.message, 'err');
    return false;
  }
}

async function sendEmailToLead(leadId) {
  const lead = S.leads.find(l => l.id === leadId);
  if (!lead?.email) { notify('No email for this lead', 'warn'); return; }
  
  const tmpl = S.templates.find(t => t.id === S.activeTpl);
  if (!tmpl) { notify('Select a template first', 'warn'); return; }
  
  const footer = buildFooter(S.settings);
  const subject = fillTpl(tmpl.subject, lead);
  const body = fillTpl(tmpl.body + '\n\n' + footer, lead);
  
  S.sendingId = leadId;
  render();
  
  const ok = await sendViaGmail(lead.email, subject, body);
  S.sendingId = null;
  
  if (ok) {
    updateLead(leadId, { emailed: true, emailedAt: new Date().toISOString(), status: 'emailed' });
    addSent(1);
    notify(`✅ Email sent to ${lead.name}!`, 'ok');
    render();
  }
}

async function bulkSendGmail() {
  if (!gmailAccessToken) { notify('Connect Gmail first in Settings', 'warn'); return; }
  
  const fl = getFiltered();
  const toSend = (S.selIds.size > 0 
    ? fl.filter(l => S.selIds.has(l.id)) 
    : fl
  ).filter(l => l.email && !l.emailed && l.status !== 'unsubscribed');
  
  if (!toSend.length) { notify('No fresh leads with emails to send', 'warn'); return; }
  
  const tmpl = S.templates.find(t => t.id === S.activeTpl);
  if (!tmpl) { notify('Select a template first in Templates tab', 'warn'); return; }
  
  const limit = PROVIDERS[S.settings.provider || 'Gmail Free'] || 500;
  const batch = toSend.slice(0, Math.min(toSend.length, limit));
  
  if (!confirm(`Send emails to ${batch.length} leads via Gmail?\n\nTemplate: "${tmpl.name}"\nFrom: ${S.settings.bEmail || 'your Gmail'}\n\nThis cannot be undone.`)) return;
  
  S.bulkSending = true;
  S.bulkSendProg = 0;
  S.bulkSendTotal = batch.length;
  S.bulkSendFailed = 0;
  render();
  
  const footer = buildFooter(S.settings);
  
  for (let i = 0; i < batch.length; i++) {
    const lead = batch[i];
    S.bulkSendProg = i + 1;
    render();
    
    const subject = fillTpl(tmpl.subject, lead);
    const body = fillTpl(tmpl.body + '\n\n' + footer, lead);
    
    const ok = await sendViaGmail(lead.email, subject, body);
    
    if (ok) {
      updateLead(lead.id, { emailed: true, emailedAt: new Date().toISOString(), status: 'emailed' });
      addSent(1);
    } else {
      S.bulkSendFailed++;
      if (!gmailAccessToken) break; // Token expired — stop
    }
    
    // 3 second delay between emails (avoids spam filters)
    if (i < batch.length - 1) await new Promise(r => setTimeout(r, 3000));
  }
  
  S.bulkSending = false;
  const sent = S.bulkSendProg - S.bulkSendFailed;
  notify(`✅ Done! Sent ${sent}/${batch.length} emails via Gmail`, 'ok', 8000);
  S.selIds = new Set();
  render();
}

// Load saved Gmail token on startup
function loadGmailToken() {
  const saved = localStorage.getItem('v4_gmail_token');
  if (saved) {
    gmailAccessToken = saved;
    S.gmailConnected = true;
  }
}

// ABN LOOKUP — Australian Business Register (Free)
// ════════════════════════════════════════════════════════
async function lookupABN(abn) {
  // Clean ABN — remove spaces
  const cleanABN = abn.replace(/\s/g, '');
  if (cleanABN.length !== 11) {
    notify('ABN must be 11 digits', 'warn');
    return null;
  }
  
  try {
    // Use ABR API via CORS proxy
    const url = `https://abr.business.gov.au/json/AbnDetails.aspx?abn=${cleanABN}&callback=?`;
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://abr.business.gov.au/json/AbnDetails.aspx?abn=' + cleanABN + '&guid=00000000-0000-0000-0000-000000000000')}`);
    const data = await res.json();
    
    // Parse JSONP response
    const text = data.contents;
    const match = text.match(/\((.+)\)/s);
    if (!match) return null;
    
    const parsed = JSON.parse(match[1]);
    if (parsed.Message) {
      notify('ABN not found: ' + parsed.Message, 'warn');
      return null;
    }
    
    return {
      abn: parsed.Abn,
      name: parsed.EntityName,
      type: parsed.EntityTypeName,
      state: parsed.AddressState,
      postcode: parsed.AddressPostcode,
      status: parsed.AbnStatus,
      gst: parsed.Gst === 'Y',
    };
  } catch(e) {
    notify('ABN lookup failed: ' + e.message, 'err');
    return null;
  }
}

async function lookupBusinessByName(name, state='QLD') {
  try {
    const query = encodeURIComponent(name + ' ' + state);
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://abr.business.gov.au/json/MatchingNames.aspx?name=' + query + '&guid=00000000-0000-0000-0000-000000000000')}`);
    const data = await res.json();
    const text = data.contents;
    const match = text.match(/\((.+)\)/s);
    if (!match) return [];
    const parsed = JSON.parse(match[1]);
    return (parsed.Names || []).slice(0, 5).map(n => ({
      abn: n.Abn,
      name: n.Name,
      state: n.State,
      postcode: n.Postcode,
      status: n.Status,
    }));
  } catch(e) {
    return [];
  }
}

async function enrichLeadWithABN(leadId) {
  const lead = S.leads.find(l => l.id === leadId);
  if (!lead) return;
  
  notify('🔍 Looking up ABN for ' + lead.name + '...', 'info', 5000);
  S.abnLoading = leadId;
  render();
  
  // Try by business name first
  const results = await lookupBusinessByName(lead.name, 'QLD');
  S.abnLoading = null;
  
  if (results.length === 0) {
    notify('No ABN found for ' + lead.name, 'warn');
    render();
    return;
  }
  
  // Auto-match if only one result or exact name match
  const exact = results.find(r => r.name.toLowerCase() === lead.name.toLowerCase());
  const match = exact || results[0];
  
  if (match) {
    updateLead(leadId, { 
      abn: match.abn,
      notes: (lead.notes ? lead.notes + '\n' : '') + `[ABN: ${match.abn}] ${match.name} — ${match.status}`
    });
    notify(`✅ ABN found: ${match.abn} — ${match.name}`, 'ok', 6000);
    if (S.viewingLead?.id === leadId) {
      S.viewingLead = S.leads.find(l => l.id === leadId);
    }
  }
  render();
}

async function bulkEnrichABN() {
  const leads = S.leads.filter(l => !l.abn && l.suburb).slice(0, 20);
  if (!leads.length) { notify('No leads without ABN found', 'warn'); return; }
  
  S.abnBulkRunning = true;
  S.abnBulkProg = 0;
  S.abnBulkTotal = leads.length;
  render();
  notify('🔍 Bulk ABN lookup — ' + leads.length + ' leads...', 'info', 30000);
  
  for (let i = 0; i < leads.length; i++) {
    S.abnBulkProg = i + 1;
    render();
    
    const results = await lookupBusinessByName(leads[i].name, 'QLD');
    if (results.length > 0) {
      const match = results.find(r => r.name.toLowerCase() === leads[i].name.toLowerCase()) || results[0];
      updateLead(leads[i].id, { abn: match.abn });
    }
    
    // 1 second delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 1000));
  }
  
  S.abnBulkRunning = false;
  const found = S.leads.filter(l => l.abn).length;
  notify(`✅ Done! Found ABNs for ${S.abnBulkProg} leads. Total with ABN: ${found}`, 'ok', 8000);
  render();
}

// KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT") return;
  if(e.key==="Escape"){
    if(S.modal){S.modal=null;S.viewingLead=null;render();}
    else if(S.settingsOpen){S.settingsOpen=false;render();}
  }
  if(e.key==="?"){notify("Shortcuts: ESC=close modal · F=find leads · L=my leads · P=pipeline · D=dashboard","info",6000);}
  if(e.key==="f"||e.key==="F"&&!e.ctrlKey&&!e.metaKey){S.tab="find";render();}
  if(e.key==="l"||e.key==="L"&&!e.ctrlKey){S.tab="leads";render();}
  if(e.key==="d"||e.key==="D"&&!e.ctrlKey){S.tab="dashboard";render();}
  if(e.key==="p"||e.key==="P"&&!e.ctrlKey){S.tab="pipeline";render();}
});

// INIT
// ════════════════════════════════════════════════════════
async function init(){
  // Apply saved theme immediately
  document.documentElement.setAttribute('data-theme', S.theme);
  loadLocal();
  loadGmailToken();
  S.authLoading=true;
  render(); // show immediately with local data

  // Check backend health
  await checkApiHealth();

  // Try silent token refresh (user may already be logged in via cookie)
  if(S.backendOnline){
    const refreshed=await refreshToken();
    if(refreshed){
      S.authed=true;
      await fullSync();
    }
  } else {
    // Offline mode — use local data
    S.authed=true;
  }

  S.authLoading=false;
  render();

  if(!S.settings.bName) setTimeout(()=>{S.settingsOpen=true;render();},600);

  // Background health check every 30s
  setInterval(async()=>{
    await checkApiHealth();
    render();
  },30000);
}

init();
