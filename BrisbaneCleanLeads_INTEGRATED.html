async function requestNotificationPermission() {
  if (!('Notification' in window)) {
    notify('Browser notifications not supported', 'warn');
    return false;
  }
  const result = await Notification.requestPermission();
  S.notificationsEnabled = result === 'granted';
  localStorage.setItem('v4_notif_enabled', S.notificationsEnabled);
  if (S.notificationsEnabled) {
    notify('✅ Notifications enabled!', 'ok');
    // Send test notification
    new Notification('Brisbane Clean Leads', {
      body: '🔔 Notifications are now enabled! You will be alerted for follow-ups.',
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="80">🧹</text></svg>'
    });
  }
  render();
  return S.notificationsEnabled;
}

function sendBrowserNotif(title, body) {
  if (!S.notificationsEnabled || Notification.permission !== 'granted') return;
  new Notification(title, {
    body,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="80">🧹</text></svg>',
    badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="80">🧹</text></svg>'
  });
}

function checkNotifications() {
  if (!S.notificationsEnabled) return;
  const today = todayKey();
  const now = new Date();
  
  // Check overdue follow-ups
  const overdue = S.leads.filter(l => 
    l.followUpDate && 
    l.followUpDate.split('T')[0] < today && 
    l.status !== 'won' && l.status !== 'lost'
  );
  
  if (overdue.length > 0) {
    sendBrowserNotif(
      '📅 Follow-ups Overdue!',
      `You have ${overdue.length} overdue follow-up${overdue.length>1?'s':''} in Brisbane Clean Leads.`
    );
  }
  
  // Check scheduled emails
  const dateStr = now.toISOString().split('T')[0];
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const dueSchedule = (S.schedules||[]).find(s => s.status==='pending' && s.date===dateStr && s.time===timeStr);
  if (dueSchedule) {
    sendBrowserNotif('⏰ Scheduled Email Sending!', 'Your scheduled email campaign is starting now.');
  }
}

function exportBackup() {
  const backup = {
    version: 4,
    exportedAt: new Date().toISOString(),
    exportedBy: S.user?.email || 'unknown',
    data: {
      leads: S.leads,
      settings: S.settings,
      templates: S.templates,
      campaigns: S.campaigns,
      covered: S.covered,
      history: S.history,
      unsubscribes: S.unsubscribes,
      replies: S.replies,
      calls: S.calls,
      quotes: S.quotes,
      schedules: S.schedules,
      teamMembers: S.teamMembers,
      aiScores: S.aiScores,
      dailyLog: S.dailyLog,
    }
  };
  
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `brisbane-clean-leads-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  notify('✅ Backup downloaded!', 'ok');
}

function importBackup(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.version || !backup.data) {
        notify('Invalid backup file', 'err');
        return;
      }
      if (!confirm(`Restore backup from ${backup.exportedAt?.split('T')[0]}?\n\nThis will REPLACE all current data including ${backup.data.leads?.length||0} leads.\n\nCurrent data will be lost!`)) return;
      
      const d = backup.data;
      if (d.leads) S.leads = d.leads;
      if (d.settings) S.settings = { ...S.settings, ...d.settings };
      if (d.templates) S.templates = d.templates;
      if (d.campaigns) S.campaigns = d.campaigns;
      if (d.covered) S.covered = d.covered;
      if (d.history) S.history = d.history;
      if (d.unsubscribes) S.unsubscribes = d.unsubscribes;
      if (d.replies) S.replies = d.replies;
      if (d.calls) S.calls = d.calls;
      if (d.quotes) S.quotes = d.quotes;
      if (d.schedules) S.schedules = d.schedules;
      if (d.teamMembers) S.teamMembers = d.teamMembers;
      if (d.aiScores) S.aiScores = d.aiScores;
      if (d.dailyLog) S.dailyLog = d.dailyLog;
      
      saveLocal();
      notify(`✅ Backup restored! ${d.leads?.length||0} leads imported.`, 'ok', 8000);
      render();
    } catch(err) {
      notify('Failed to restore backup: ' + err.message, 'err');
    }
  };
  reader.readAsText(file);
}

async function requestNotificationPermission() {
  if (!('Notification' in window)) {
    notify('Your browser does not support notifications', 'warn');
    return false;
  }
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') {
    notify('Notifications blocked — enable in browser settings', 'warn');
    return false;
  }
  const permission = await Notification.requestPermission();
  return permission === 'granted';
}

function sendBrowserNotification(title, body, icon='🧹') {
  if (Notification.permission !== 'granted') return;
  new Notification(title, {
    body,
    icon: 'https://img.icons8.com/fluency/96/broom.png',
    badge: 'https://img.icons8.com/fluency/96/broom.png',
    tag: 'brisbane-clean-leads',
  });
}

function checkNotifications() {
  if (Notification.permission !== 'granted') return;
  const today = todayKey();
  const now = new Date();
  
  // Follow-up due today
  const dueTodayLeads = S.leads.filter(l => 
    l.followUpDate && 
    l.followUpDate.split('T')[0] === today &&
    l.status !== 'won' && l.status !== 'lost'
  );
  
  if (dueTodayLeads.length > 0) {
    sendBrowserNotification(
      `📅 ${dueTodayLeads.length} Follow-ups Due Today!`,
      dueTodayLeads.slice(0,3).map(l=>l.name).join(', ') + (dueTodayLeads.length>3?` and ${dueTodayLeads.length-3} more`:'')
    );
  }
  
  // Overdue follow-ups
  const overdueLeads = S.leads.filter(l => 
    l.followUpDate && 
    new Date(l.followUpDate) < now &&
    l.followUpDate.split('T')[0] < today &&
    l.status !== 'won' && l.status !== 'lost'
  );
  
  if (overdueLeads.length > 0) {
    sendBrowserNotification(
      `🔴 ${overdueLeads.length} Overdue Follow-ups!`,
      'Check your Follow-Up Centre tab immediately'
    );
  }
}

    <div style="font-size:13px;font-weight:700;color:var(--lime);margin-bottom:8px;">📤 Export Backup</div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6;">
      Downloads a complete JSON backup of ALL your data — leads, templates, settings, call logs, quotes, AI scores, replies and more. Save this file safely.
    </p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-p" style="font-size:12px;" onclick="exportAllData();localStorage.setItem('v4_last_backup',new Date().toISOString());render()">
        💾 Download Full Backup (${dataSizeKB}KB)
      </button>
      <button class="btn btn-b" style="font-size:12px;" onclick="W.exportCSVBackup()">
        📊 Export Leads as CSV
      </button>
    </div>
    ${lastBackup?`<div style="font-size:10px;color:var(--green);margin-top:8px;">✅ Last backup: ${new Date(lastBackup).toLocaleDateString('en-AU')}</div>`:`<div style="font-size:10px;color:var(--yellow);margin-top:8px;">⚠️ No backup taken yet — do this now!</div>`}
  </div>

  <!-- Import -->
  <div class="card" style="margin-bottom:16px;border-color:rgba(217,119,6,.3);">
    <div style="font-size:13px;font-weight:700;color:var(--orange);margin-bottom:8px;">📥 Restore Backup</div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6;">
      ⚠️ This will replace ALL current data with the backup. Make sure to export first!
    </p>
    <input type="file" accept=".json" onchange="importBackup(this.files[0])" style="margin-bottom:8px;"/>
  </div>

  <!-- Backup tips -->
  <div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px;">💡 Backup Best Practices</div>
    ${[
      ['📅 Back up weekly', 'Set a reminder every Monday to download a backup'],
      ['☁️ Store in Google Drive', 'Upload the JSON file to Google Drive for cloud safety'],
      ['📧 Email to yourself', 'Send the backup file to your email as extra safety'],
      ['🔄 Test restore occasionally', 'Try restoring a backup every month to verify it works'],
      ['💻 Multiple devices', 'Keep a copy on your phone AND computer'],
    ].map(([icon_title, detail])=>`
    <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:13px;flex-shrink:0;">${icon_title.split(' ')[0]}</span>
      <div>
        <div style="font-size:12px;font-weight:600;">${icon_title.slice(icon_title.indexOf(' ')+1)}</div>
        <div style="font-size:11px;color:var(--text2);">${detail}</div>
      </div>
    </div>`).join('')}
  </div>
  </div>`;
}
// ════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT") return;
  if(e.key==="Escape"){
    if(S.modal){S.modal=null;S.viewingLead=null;render();}
    else if(S.settingsOpen){S.settingsOpen=false;render();}
  }
  if(e.key==="?"){notify("Shortcuts: ESC=close modal · F=find leads · L=my leads · P=pipeline · D=dashboard","info",6000);}
  if(e.key==="f"||e.key==="F"&&!e.ctrlKey&&!e.metaKey){S.tab="find";render();}
  if(e.key==="l"||e.key==="L"&&!e.ctrlKey){S.tab="leads";render();}
  if(e.key==="d"||e.key==="D"&&!e.ctrlKey){S.tab="dashboard";render();}
  if(e.key==="p"||e.key==="P"&&!e.ctrlKey){S.tab="pipeline";render();}
});

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
async function init(){
  // Apply saved theme immediately
  document.documentElement.setAttribute('data-theme', S.theme);
  loadLocal();
  loadGmailToken();
  S.authLoading=true;
  render(); // show immediately with local data

  // Check backend health
  await checkApiHealth();

  // Try silent token refresh (user may already be logged in via cookie)
  if(S.backendOnline){
    const refreshed=await refreshToken();
    if(refreshed){
      S.authed=true;
      await fullSync();
    }
  } else {
    // Offline mode — use local data
    S.authed=true;
  }

  S.authLoading=false;
  render();

  if(!S.settings.bName) setTimeout(()=>{S.settingsOpen=true;render();},600);
  
  // Check browser notifications every 15 minutes
  setInterval(checkNotifications, 15 * 60 * 1000);
  setTimeout(checkNotifications, 5000); // Check 5 seconds after load
  
  // Check notifications on startup
  setTimeout(()=>checkNotifications(), 3000);
  // Check notifications every 30 minutes
  setInterval(()=>checkNotifications(), 30*60*1000);
  
  // Check scheduled emails every minute
  setInterval(()=>{
    const now=new Date();
    const dateStr=now.toISOString().split('T')[0];
    const timeStr=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    S.schedules.forEach(s=>{
      if(s.status==='pending'&&s.date===dateStr&&s.time===timeStr){
        notify('⏰ Scheduled email sending starting now!','info',5000);
        W.runScheduleNow(s.id);
      }
    });
  },60000);

  // Background health check every 30s
  setInterval(async()=>{
    await checkApiHealth();
    render();
  },30000);
}

init();
</script>
</body>
</html>
